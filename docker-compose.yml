version: '3.8'

services:

  apache:
    image: php:8.2-apache
    container_name: apache
    ports:
      - "80:80"
    volumes:
      - ./apache/php:/var/www/html
    restart: unless-stopped
    networks:
      data_net:
        ipv4_address: 192.168.20.10

  db:
    image: mariadb:latest
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: lmc
      MYSQL_DATABASE: saecoef61
      MYSQL_USER: lmc
      MYSQL_PASSWORD: lmc
    ports:
      - "3306:3306"
    volumes:
      - ./db/data:/var/lib/mysql
    restart: unless-stopped
    networks:
      data_net:
        ipv4_address: 192.168.20.30

  vod:
    image: jellyfin/jellyfin
    container_name: vod
    ports:
      - "8096:8096"
    volumes:
      - ./vod/config:/config
      - ./vod/cache:/cache
      - ./vod/media:/media
    restart: unless-stopped
    networks:
      voixvideo_net:
        ipv4_address: 192.168.10.30

  mail:
    image: mailserver/docker-mailserver:latest
    container_name: mail
    hostname: mail
    domainname: saecoef61.local

    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ONE_DIR=1

    ports:
      - "25:25"
      - "143:143"
      - "587:587"

    volumes:
      - ./mail/data:/var/mail
      - ./mail/state:/var/mail-state
      - ./mail/logs:/var/log/mail
      - ./mail/config:/tmp/docker-mailserver

    restart: unless-stopped

    networks:
      data_net:
        ipv4_address: 192.168.20.20

  dns:
    image: ubuntu/bind9
    container_name: dns
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./dns/config/named.conf.local:/etc/bind/named.conf.local
      - ./dns/zones:/etc/bind/zones
    restart: unless-stopped
    networks:
      data_net:
        ipv4_address: 192.168.20.40

  asterisk:
    image: andrius/asterisk
    container_name: asterisk
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./asterisk/config/pjsip.conf:/etc/asterisk/pjsip.conf
      - ./asterisk/config/extensions.conf:/etc/asterisk/extensions.conf
    restart: unless-stopped
    networks:
      voixvideo_net:
        ipv4_address: 192.168.10.10

  iptv:
    image: jrottenberg/ffmpeg
    container_name: iptv
    entrypoint: ["/bin/sh","/stream.sh"]
    environment:
      - MULTICAST_IP=239.1.1.1
      - MULTICAST_PORT=5000
      - TTL=64
      - LOCALADDR=192.168.10.20

    #command:
     # - -c
      #- |
       #   ffmpeg -re -stream_loop -1 -i /media/death.mp4 -c copy -f mpegts udp://239.1.1.1:5000 &
        #  ffmpeg -re -stream_loop -1 -i /media/rick.mp4 -c copy -f mpegts udp://239.1.1.2:5000
         # wait

    volumes:
       - ./iptv/media:/media
       - ./iptv/stream.sh:/stream.sh
    restart: unless-stopped
    networks:
      voixvideo_net:
        ipv4_address: 192.168.10.20

networks:
  voixvideo_net:
    external: true

  data_net:
    external: true

