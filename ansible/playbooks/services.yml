---
- name: Lancer les conteneurs de services
  hosts: services
  gather_facts: no
  become: yes

  tasks:
    - name: Démarrer le service Docker
      service:
        name: docker
        state: started

    - name: Vérifier si /opt/services/docker-compose.yml existe
      stat:
        path: /opt/services/docker-compose.yml
      register: compose_global

    - name: Lancer les services du docker-compose global
      command: docker-compose up -d
      args:
        chdir: /opt/services
      when: compose_global.stat.exists

    - name: Vérifier si le docker-compose mail existe
      stat:
        path: /opt/services/mail/docker-compose.yml
      register: compose_mail

    - name: Lancer le service mail
      command: docker-compose up -d
      args:
        chdir: /opt/services/mail
      when: compose_mail.stat.exists

    - name: Démarrer les conteneurs existants si arrêtés
      shell: |
        for c in apache db dns vod mail asterisk iptv; do
          if docker ps -a --format '{{ "{{.Names}}" }}' | grep -qx "$c"; then
            docker start "$c" || true
          fi
        done

    - name: Afficher les conteneurs actifs
      command: docker ps
      register: docker_ps

    - name: Résultat docker ps
      debug:
        var: docker_ps.stdout_lines
