---
- name: Configuration exacte des switches
  hosts: switches
  gather_facts: no

  vars:
    switches_config:
      Switch1:
        hostname: switch1
        global:
          - service compress-config
          - no ip domain-lookup
          - ip domain-name lab.local
          - no ip cef
          - no ipv6 cef
          - spanning-tree mode pvst
          - spanning-tree extend system-id
          - username admin privilege 15 secret admin123
          - ip ssh time-out 60
          - ip ssh version 2
          - ip ssh server algorithm encryption aes128-ctr aes192-ctr aes256-ctr
          - ip ssh client algorithm encryption aes128-ctr aes192-ctr aes256-ctr
          - ip default-gateway 172.16.0.254
          - ip http server
        interfaces:
          Ethernet0/0:
            - description Ansible
            - switchport access vlan 99
            - switchport mode access
          Ethernet0/1:
            - description IOU1-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet0/2:
            - description IOU2-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet0/3:
            - description IOU3-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet1/0:
            - description IOU4-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet1/1:
            - description IOU5-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet1/2:
            - description IOU6-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet1/3:
            - description IOU7-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet2/0:
            - description IOU8-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet2/1:
            - description IOU9-MGMT
            - switchport access vlan 99
            - switchport mode access
          Ethernet2/2:
            - description Vers Switch2
            - switchport access vlan 99
            - switchport mode access
          Ethernet2/3:
            - description Vers Switch3
            - switchport access vlan 99
            - switchport mode access
          Vlan1:
            - no ip address
            - shutdown
          Vlan99:
            - ip address 172.16.0.1 255.255.255.0
            - no shutdown

      IOU9:
        hostname: IOU9
        global:
          - service compress-config
          - ip multicast-routing
          - ip cef
          - no ipv6 cef
          - no ip domain-lookup
          - ip domain-name lab.local
          - spanning-tree mode pvst
          - spanning-tree extend system-id
          - username admin privilege 15 secret admin123
          - ip pim rp-address 1.1.1.1
          - ip http server
          - ip route 0.0.0.0 0.0.0.0 10.1.9.2
          - ip route 100.64.0.0 255.192.0.0 192.168.99.2
          - ip ssh time-out 60
          - ip ssh version 2
          - ip ssh server algorithm encryption aes128-ctr aes192-ctr aes256-ctr
          - ip ssh client algorithm encryption aes128-ctr aes192-ctr aes256-ctr
        interfaces:
          Loopback0:
            - ip address 9.9.9.9 255.255.255.255
          Ethernet0/0:
            - description CLOUD ANSIBLE
            - switchport access vlan 99
            - switchport mode access
          Ethernet0/1:
            - description VM Services
            - switchport trunk allowed vlan 10,20,99
            - switchport trunk encapsulation dot1q
            - switchport mode trunk
          Ethernet0/2:
            - description IOU1
            - no switchport
            - ip address 10.1.9.1 255.255.255.252
            - ip pim sparse-mode
            - no shutdown
          Vlan1:
            - no ip address
            - shutdown
          Vlan10:
            - ip address 192.168.10.1 255.255.255.0
            - no shutdown
          Vlan20:
            - ip address 192.168.20.1 255.255.255.0
            - no shutdown
          Vlan99:
            - ip address 172.16.0.19 255.255.255.0
            - no shutdown
        ospf:
          - router-id 9.9.9.9
          - network 9.9.9.9 0.0.0.0 area 0
          - network 10.1.9.0 0.0.0.3 area 0
          - network 172.16.0.0 0.0.0.255 area 0
          - network 192.168.1.0 0.0.0.255 area 0
          - network 192.168.10.0 0.0.0.255 area 0
          - network 192.168.20.0 0.0.0.255 area 0

      Switch2:
        hostname: Switch2
        global:
          - service compress-config
          - no ip domain-lookup
          - ip domain-name lab.local
          - no ip cef
          - no ipv6 cef
          - spanning-tree mode pvst
          - spanning-tree extend system-id
          - username admin privilege 15 secret admin123
          - ip default-gateway 172.16.0.1
          - ip http server
          - ip route 0.0.0.0 0.0.0.0 10.22.7.2
          - ip ssh time-out 60
          - ip ssh version 2
          - ip ssh server algorithm encryption aes128-ctr aes192-ctr aes256-ctr
          - ip ssh client algorithm encryption aes128-ctr aes192-ctr aes256-ctr
        interfaces:
          Loopback0:
            - ip address 20.20.20.20 255.255.255.255
          Ethernet0/0:
            - description SWITCH1_MANAGEMENT
            - switchport access vlan 99
            - switchport mode access
          Ethernet0/1:
            - description CLIENT1
            - switchport mode access
          Ethernet0/2:
            - description PE_IOU7
            - switchport mode access
          Vlan1:
            - no ip address
            - shutdown
          Vlan99:
            - ip address 172.16.0.2 255.255.255.0
            - no shutdown
        ospf:
          - router-id 20.20.20.20
          - network 10.22.7.0 0.0.0.3 area 0
          - network 20.20.20.20 0.0.0.0 area 0
          - network 192.168.2.0 0.0.0.255 area 0

      Switch3:
        hostname: switch3
        global:
          - service compress-config
          - no ip domain-lookup
          - ip domain-name lab.local
          - no ip cef
          - no ipv6 cef
          - spanning-tree mode pvst
          - spanning-tree extend system-id
          - username admin privilege 15 secret admin123
          - ip default-gateway 172.16.0.1
          - ip http server
          - ip ssh time-out 60
          - ip ssh version 2
          - ip ssh server algorithm encryption aes128-ctr aes192-ctr aes256-ctr
          - ip ssh client algorithm encryption aes128-ctr aes192-ctr aes256-ctr
        interfaces:
          Loopback0:
            - ip address 30.30.30.30 255.255.255.255
          Ethernet0/0:
            - description SWITCH1_MANAGEMENT
            - switchport access vlan 99
            - switchport mode access
          Ethernet0/1:
            - description CLIENT2
            - switchport mode access
          Ethernet0/2:
            - description Vers Switch1
            - switchport mode access
          Vlan1:
            - no ip address
            - shutdown
          Vlan99:
            - ip address 172.16.0.3 255.255.255.0
            - no shutdown
        ospf:
          - router-id 30.30.30.30
          - network 10.33.8.0 0.0.0.3 area 0
          - network 30.30.30.30 0.0.0.0 area 0
          - network 192.168.3.0 0.0.0.255 area 0

  tasks:
    - name: Configuration globale
      cisco.ios.ios_config:
        lines: "{{ switches_config[inventory_hostname].global }}"

    - name: Configurer hostname
      cisco.ios.ios_config:
        lines:
          - "hostname {{ switches_config[inventory_hostname].hostname }}"

    - name: Configuration VTY SSH
      cisco.ios.ios_config:
        parents: line vty 0 4
        lines:
          - login local
          - transport input ssh

    - name: Configurer les interfaces
      cisco.ios.ios_config:
        parents: "interface {{ item.key }}"
        lines: "{{ item.value }}"
      loop: "{{ switches_config[inventory_hostname].interfaces | dict2items }}"

    - name: Configurer OSPF si présent
      cisco.ios.ios_config:
        parents: router ospf 1
        lines: "{{ switches_config[inventory_hostname].ospf }}"
      when: switches_config[inventory_hostname].ospf is defined

    - name: Sauvegarder la configuration
      cisco.ios.ios_config:
        save_when: modified
